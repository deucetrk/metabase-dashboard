        body,
        html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background-color: #f4f6f8;
            font-family: sans-serif;
        }

        metabase-dashboard {
            width: 100%;
            height: 100vh;
            display: block;
            border: none;
        }
    </style>
    <!-- Load the Metabase embedding script -->
    <script defer src="https://agile-sea.metabaseapp.com/app/embed.js"></script>
    <script>
        function defineMetabaseConfig(config) {
            window.metabaseConfig = config;
        }
    </script>
    <script>
        defineMetabaseConfig({
            "isGuest": true,
            "instanceUrl": "https://agile-sea.metabaseapp.com"
        });
    </script>
</head>
